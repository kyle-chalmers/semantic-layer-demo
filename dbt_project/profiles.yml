semantic_layer_demo:
  target: dev
  outputs:
    dev:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      private_key_path: "{{ env_var('SNOWFLAKE_PRIVATE_KEY_PATH') }}"
      role: ACCOUNTADMIN
      warehouse: COMPUTE_EXTRA_SMALL
      database: ANALYTICS
      schema: PUBLIC
      threads: 4
