version: 2

semantic_models:
  - name: orders
    defaults:
      agg_time_dimension: order_date
    description: "Order-level semantic model from TPCH data"
    model: ref('stg_orders')
    entities:
      - name: order_id
        type: primary
      - name: customer_id
        type: foreign
    dimensions:
      - name: order_date
        type: time
        type_params:
          time_granularity: day
      - name: order_status
        type: categorical
    measures:
      - name: order_count
        agg: count_distinct
        expr: order_id

  - name: customers
    description: "Customer-level semantic model from TPCH data"
    model: ref('stg_customers')
    entities:
      - name: customer_id
        type: primary
    dimensions:
      - name: market_segment
        type: categorical
      - name: customer_name
        type: categorical

  - name: line_items
    defaults:
      agg_time_dimension: ship_date
    description: "Line item semantic model from TPCH data"
    model: ref('stg_lineitem')
    entities:
      - name: order_id
        type: foreign
    dimensions:
      - name: ship_date
        type: time
        type_params:
          time_granularity: day
    measures:
      - name: total_revenue
        agg: sum
        expr: extended_price
        description: "Total revenue (sum of extended price)"
      - name: avg_discount
        agg: average
        expr: discount
